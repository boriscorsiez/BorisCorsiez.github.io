<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KingDream Digital</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-page: #000; 
            --card-bg: #fff; 
            --text-main: #1a1a1a; 
            --text-secondary: #555; 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body { 
            background: var(--bg-page); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
        }

        .phone-card { 
            background: var(--card-bg); 
            width: 100%; 
            max-width: 400px; 
            border-radius: 45px; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.8); 
            overflow: hidden; 
            text-align: center; 
            padding-bottom: 30px; 
            position: relative; 
        }

        /* BANNIÈRE AVEC LOGO */
        .header-banner { 
            height: 280px; 
            background: #000; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
            padding-bottom: 50px; /* Espace pour ne pas que la vague coupe le logo */
        }

        .logo-img { 
            width: 85%; 
            max-width: 320px; 
            position: relative;
            z-index: 2;
        }

        /* LA VAGUE CORRIGÉE */
        .wave-container { 
            position: absolute; 
            bottom: -2px; /* Collée au bas */
            left: 0;
            width: 100%; 
            line-height: 0;
            z-index: 3;
        }
        .wave-container svg { 
            width: 100%; 
            height: 80px; 
            fill: #fff; 
        }

        /* CONTENU */
        .info-content { padding: 30px 25px 20px; }
        
        .job-title { 
            font-size: 18px; 
            letter-spacing: 5px; 
            font-weight: 800; 
            margin-bottom: 15px; 
            text-transform: uppercase;
        }

        .bio { 
            font-size: 14px; 
            color: var(--text-secondary); 
            margin-bottom: 30px; 
            line-height: 1.5;
        }

        .btn-main { 
            background: #000; 
            color: #fff; 
            padding: 18px 45px; 
            border-radius: 50px; 
            border: none; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 16px;
            transition: transform 0.2s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .btn-main:active { transform: scale(0.95); }

        /* GRILLE ACTIF */
        .grid-active { 
            display: flex; 
            justify-content: center; 
            gap: 12px; 
            margin-top: 30px; 
            flex-wrap: wrap; 
        }
        .icon-card { 
            width: 75px; 
            height: 75px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            border-radius: 22px; 
            color: white; 
            font-size: 24px; 
            text-decoration: none; 
        }
        .phone { background: #4CD964; } 
        .sms { background: #FF2D55; } 
        .mail { background: #5AC8FA; } 
        .insta { background: radial-gradient(circle at 30% 107%, #fdf497, #fd5949, #d6249f, #285AEB); } 
        .web { background: #0046be; }

        /* SECTION EN COURS (GRISÉ) */
        .pending-section {
            margin-top: 35px;
            border-top: 1px solid #f0f0f0;
            padding-top: 20px;
        }
        .pending-title {
            font-size: 10px;
            font-weight: 800;
            color: #bbb;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }
        .grid-pending {
            display: flex;
            justify-content: center;
            gap: 12px;
            opacity: 0.3;
            filter: grayscale(1);
        }
        .icon-pending {
            width: 45px; 
            height: 45px;
            display: flex; 
            justify-content: center; 
            align-items: center;
            border-radius: 12px; 
            background: #eee; 
            color: #666; 
            font-size: 18px;
        }

        .brand-footer { margin-top: 25px; font-size: 10px; color: #ccc; letter-spacing: 2px; font-weight: 700; }
    </style>
</head>

<body>

<div class="phone-card">
    
    <div class="header-banner">
        <img src="https://i.ibb.co/237GdNW6/a298a2bb-7e2d-4af5-9688-5e07d30d8991.png" class="logo-img">
        <div class="wave-container">
            <!-- SVG de la vague calé précisément -->
            <svg viewBox="0 0 500 150" preserveAspectRatio="none">
                <path d="M0,70 C150,170 350,0 500,70 L500,150 L0,150 Z"></path>
            </svg>
        </div>
    </div>

    <div class="info-content">
        <p class="job-title">Digital Solutions</p>
        <p class="bio">Propulsez votre présence en ligne avec des stratégies digitales innovantes et un design haute performance.</p>

        <button class="btn-main" onclick="downloadVCard()">Ajouter au contact</button>

        <!-- Réseaux Actifs -->
        <div class="grid-active">
            <a href="tel:0627205597" class="icon-card phone"><i class="fa-solid fa-phone"></i></a>
            <a href="sms:0627205597" class="icon-card sms"><i class="fa-solid fa-comment-dots"></i></a>
            <a href="mailto:Contact@Kingdream.fr" class="icon-card mail"><i class="fa-solid fa-envelope"></i></a>
            <a href="https://www.instagram.com/kingdream_digital/" target="_blank" class="icon-card insta"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://Kingdream.fr" target="_blank" class="icon-card web"><i class="fa-solid fa-globe"></i></a>
        </div>

        <!-- Section En cours de développement (Grisée) -->
        <div class="pending-section">
            <p class="pending-title">En cours de production</p>
            <div class="grid-pending">
                <div class="icon-pending"><i class="fa-brands fa-whatsapp"></i></div>
                <div class="icon-pending"><i class="fa-brands fa-linkedin-in"></i></div>
                <div class="icon-pending"><i class="fa-brands fa-tiktok"></i></div>
                <div class="icon-pending"><i class="fa-brands fa-facebook-f"></i></div>
            </div>
        </div>

        <div class="brand-footer">KINGDREAM DIGITAL</div>
    </div>

</div>

<script>
function downloadVCard() {
    const vCard = [
        "BEGIN:VCARD",
        "VERSION:3.0",
        "N:;KingDream Digital;;;",
        "FN:KingDream Digital",
        "ORG:KingDream Digital",
        "TEL;TYPE=CELL:0627205597",
        "EMAIL:Contact@Kingdream.fr",
        "URL:https://Kingdream.fr",
        "PHOTO;VALUE=URI:https://i.ibb.co/237GdNW6/a298a2bb-7e2d-4af5-9688-5e07d30d8991.png",
        "END:VCARD"
    ].join("\r\n");

    const blob = new Blob([vCard], { type: "text/vcard;charset=utf-8" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "KingDream.vcf";

    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    URL.revokeObjectURL(url);
}
</script>

</body>
</html>
