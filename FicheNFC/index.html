<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KingDream Digital</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-page: #000000;
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-secondary: #555;
            --king-blue: #0046be;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg-page);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .phone-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 400px;
            border-radius: 45px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            overflow: hidden;
            text-align: center;
            padding-bottom: 40px;
            position: relative;
        }

        /* BANNIÈRE NOIRE */
        .header-banner {
            height: 280px;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .logo-img {
            width: 95%;
            height: auto;
            max-width: 380px;
            position: relative;
            z-index: 1;
        }

        /* VAGUE DE TRANSITION */
        .wave-container {
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            line-height: 0;
            z-index: 5;
        }

        .wave-container svg {
            width: 100%;
            height: 90px;
            fill: var(--card-bg);
        }

        /* CONTENU TEXTE */
        .info-content {
            padding: 40px 25px 25px 25px; /* Padding augmenté pour compenser l'absence de photo */
            position: relative;
            z-index: 10;
        }

        .job-title {
            font-size: 18px;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: 800;
            margin-bottom: 25px;
        }

        .bio {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 35px;
        }

        /* BOUTON CONTACT */
        .btn-main {
            background: #000;
            color: #fff;
            padding: 18px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 35px;
            cursor: pointer;
            border: none;
            font-size: 16px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            transition: 0.2s;
        }
        .btn-main:active { transform: scale(0.95); }

        /* GRILLE ICONES */
        .grid-active {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }
        .icon-card {
            width: 82px;
            height: 82px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 24px;
            font-size: 26px;
            color: white;
            text-decoration: none;
        }
        .phone { background: #4CD964; }
        .sms { background: #FF2D55; }
        .mail { background: #5AC8FA; }
        .insta { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fd5949 45%, #d6249f 60%, #285AEB 90%); }
        .web { background: #0046be; }

        /* SECTION EN COURS */
        .pending-section {
            border-top: 1px solid #f0f0f0;
            padding-top: 25px;
        }
        .pending-title {
            font-size: 10px;
            font-weight: 800;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }
        .grid-pending {
            display: flex;
            justify-content: center;
            gap: 12px;
            opacity: 0.2;
            filter: grayscale(1);
        }
        .icon-pending {
            width: 45px; height: 45px;
            display: flex; justify-content: center; align-items: center;
            border-radius: 14px; background: #eee; color: #666; font-size: 18px;
        }

        .brand-footer {
            margin-top: 30px;
            font-size: 11px;
            color: #ddd;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
