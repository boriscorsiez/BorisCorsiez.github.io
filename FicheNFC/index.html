<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KingDream Digital - Carte de visite</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f0f5;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .phone-container {
            background: linear-gradient(to bottom, #eef0f5, #d9deea);
            width: 100%;
            max-width: 390px;
            height: 100vh;
            max-height: 844px;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 20px 20px 20px;
            box-sizing: border-box;
            overflow-y: auto;
            overflow-x: hidden;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .phone-container::-webkit-scrollbar { display: none; }

        .logo-wrapper {
            width: 150%;
            margin-left: -25%;
            margin-right: -25%;
            margin-top: -20px;
            margin-bottom: 0px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .header-logo {
            width: 100%;
            height: auto;
            display: block;
        }

        .profile-pic-container {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-top: -80px;
            margin-bottom: 4px;
            background-color: #ddd;
            flex-shrink: 0;
            position: relative;
            z-index: 2;
        }
        .profile-pic { width: 100%; height: 100%; object-fit: cover; }
        .name { font-size: 22px; font-weight: 700; color: #333; margin: 0 0 2px 0; }
        .title { font-size: 14px; color: #666; margin: 0 0 10px 0; font-weight: 500; }
        .action-btn {
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 12px 30px;
            font-size: 15px;
            font-weight: 600;
            width: 90%;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: transform 0.1s;
            flex-shrink: 0;
        }
        .action-btn:active { transform: scale(0.97); }
        .bio-section {
            text-align: center;
            font-size: 13px;
            color: #555;
            line-height: 1.5;
            margin: 10px 0;
            padding: 0 10px;
        }
        .links-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 18px;
            width: 100%;
        }
        .link-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #333;
            width: 65px;
        }
        .app-icon {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }
        .phone-app { background: linear-gradient(180deg, #34C759 0%, #28CD41 100%); }
        .mail-app { background: linear-gradient(180deg, #5AC8FA 0%, #007AFF 100%); }
        .web-app { background: #ffffff; }
        .ig-app { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%); }
        .link-label { font-size: 11px; font-weight: 500; text-align: center; white-space: nowrap; }
        .website-preview-card {
            width: 90%;
            display: block;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            text-decoration: none;
            transition: transform 0.2s ease;
            margin-bottom: 14px;
            flex-shrink: 0;
        }
        .website-preview-card:active { transform: scale(0.97); }
        .website-preview-card img { width: 100%; height: auto; display: block; }
        .footer-signature {
            width: 90%;
            border-top: 1px solid rgba(0,0,0,0.08);
            padding-top: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }
        .footer-made-by { font-size: 11px; color: #999; letter-spacing: 0.3px; }
        .footer-brand-text { font-size: 13px; font-weight: 700; color: #333; letter-spacing: 0.3px; text-decoration: none; }
        .footer-tagline { font-size: 10px; color: #aaa; letter-spacing: 0.5px; text-transform: uppercase; }
    </style>
</head>
