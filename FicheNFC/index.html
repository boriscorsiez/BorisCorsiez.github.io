<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KingDream Digital - Carte de visite</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f0f5; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone-container {
            background: linear-gradient(to bottom, #eef0f5, #d9deea);
            width: 100%;
            max-width: 390px; 
            height: 100vh;
            max-height: 844px;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 20px 30px 20px; 
            box-sizing: border-box;
            overflow-y: auto;
            overflow-x: hidden; 
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        .phone-container::-webkit-scrollbar {
            display: none;
        }

        .header-logo {
            width: 100%; 
            position: relative;
            z-index: 1; 
            transform: scale(1.5); 
            transform-origin: center top; 
            margin-top: 10px; 
            margin-bottom: -10px; 
        }

        .profile-pic-container {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 8px; 
            background-color: #ddd; 
            flex-shrink: 0;
            position: relative;
            z-index: 2; 
        }

        .profile-pic {
            width: 100%;
            height: 100%;
            object-fit: cover;
            color: transparent; 
        }

        .name {
            font-size: 22px;
            font-weight: 700;
            color: #333;
            margin: 0 0 2px 0; 
            position: relative;
            z-index: 2;
        }

        .title {
            font-size: 14px;
            color: #666;
            margin: 0 0 15px 0; 
            font-weight: 500;
            position: relative;
            z-index: 2;
        }

        .action-btn {
            background-color: #007aff; 
            color: white;
            border: none;
            border-radius: 20px;
            padding: 12px 30px;
            font-size: 15px;
            font-weight: 600;
            width: 90%;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: transform 0.1s;
            flex-shrink: 0;
            position: relative;
            z-index: 2;
        }

        .action-btn:active {
            transform: scale(0.97);
        }

        .bio-section {
            text-align: center;
            font-size: 13px;
            color: #555;
            line-height: 1.5;
            margin: 15px 0; 
            padding: 0 10px;
        }

        .links-grid {
            display: flex;
            justify-content: center;
            gap: 15px; 
            margin-bottom: 25px;
            width: 100%;
        }

        .link-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #333;
            width: 65px; 
        }

        .app-icon {
            width: 60px;
            height: 60px;
            border-radius: 16px; 
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }

        .phone-app { background: linear-gradient(180deg, #34C759 0%, #28CD41 100%); }
        .mail-app { background: linear-gradient(180deg, #5AC8FA 0%, #007AFF 100%); }
        .web-app { background: #ffffff; }
        .ig-app { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%); }

        .link-label {
            font-size: 11px;
            font-weight: 500;
            text-align: center;
            white-space: nowrap;
        }

        .website-preview-card {
            width: 90%;
            display: block;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            text-decoration: none;
            transition: transform 0.2s ease;
            margin-bottom: 10px;
            flex-shrink: 0; 
        }

        .website-preview-card:active {
            transform: scale(0.97);
        }

        .website-preview-card img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>

        if (maPhotoBase64.trim() !== "") {
            document.getElementById('web-profile-pic').src = maPhotoBase64;
        }

        document.getElementById('downloadContactBtn').addEventListener('click', function() {
            
            const contact = {
                firstName: "Boris",
                lastName: "Corsiez",
                company: "KingDream Digital",
                phone: "+33627205597",
                emailPro: "Contact@kingdream.fr",
                emailPerso: "Boris.corsiez@gmail.com",
                website: "https://kingdream.fr",
                instagram: "https://www.instagram.com/kingdream_digital/"
            };

            // ✅ CORRECTION : utilisation de \r\n (CRLF) obligatoire pour iOS
            let vcard = "BEGIN:VCARD\r\n";
            vcard += "VERSION:3.0\r\n";
            vcard += `N:${contact.lastName};${contact.firstName};;;\r\n`;
            vcard += `FN:${contact.firstName} ${contact.lastName}\r\n`;
            vcard += `ORG:${contact.company}\r\n`;
            vcard += `TEL;TYPE=CELL,VOICE:${contact.phone}\r\n`;
            vcard += `EMAIL;TYPE=WORK,INTERNET:${contact.emailPro}\r\n`;
            vcard += `EMAIL;TYPE=HOME,INTERNET:${contact.emailPerso}\r\n`;
            vcard += `URL:${contact.website}\r\n`;
            vcard += `URL;type=Instagram:${contact.instagram}\r\n`;
            
            if (maPhotoBase64.trim() !== "") {
                let cleanBase64 = maPhotoBase64;
                if (cleanBase64.includes(",")) {
                    cleanBase64 = cleanBase64.split(",")[1];
                }
                
                // ✅ CORRECTION : syntaxe ENCODING=BASE64 compatible iPhone
                // + lignes de 75 caractères max avec espace de continuation
                const wrappedPhoto = cleanBase64.match(/.{1,75}/g).join("\r\n ");
                vcard += `PHOTO;TYPE=JPEG;ENCODING=BASE64:\r\n ${wrappedPhoto}\r\n`;
            }

            vcard += "END:VCARD";

            const blob = new Blob([vcard], { type: "text/vcard;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = `${contact.firstName}_${contact.lastName}.vcf`;
            
            document.body.appendChild(a);
            a.click();
            
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        });
    </script>
