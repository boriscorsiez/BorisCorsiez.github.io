<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KingDream Digital</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg-page: #000; --card-bg: #fff; --text-main: #1a1a1a; --text-secondary: #555; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg-page); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; }
        .phone-card { background: var(--card-bg); width: 100%; max-width: 400px; border-radius: 45px; box-shadow: 0 40px 100px rgba(0,0,0,0.8); overflow: hidden; text-align: center; padding-bottom: 40px; position: relative; }
        .header-banner { height: 280px; background: #000; position: relative; display: flex; align-items: center; justify-content: center; }
        .logo-img { width: 95%; height: auto; max-width: 380px; z-index: 1; }
        .wave-container { position: absolute; bottom: -1px; left: 0; width: 100%; line-height: 0; z-index: 5; }
        .wave-container svg { width: 100%; height: 90px; fill: var(--card-bg); }
        .info-content { padding: 40px 25px 25px 25px; }
        .job-title { font-size: 18px; color: var(--text-main); text-transform: uppercase; letter-spacing: 5px; font-weight: 800; margin-bottom: 25px; }
        .bio { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 35px; }
        .btn-main { background: #000; color: #fff; padding: 18px 45px; border-radius: 50px; text-decoration: none; font-weight: 700; display: inline-block; margin-bottom: 35px; cursor: pointer; border: none; font-size: 16px; }
        .grid-active { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .icon-card { width: 80px; height: 80px; display: flex; justify-content: center; align-items: center; border-radius: 20px; font-size: 24px; color: white; text-decoration: none; }
        .phone { background: #4CD964; } .sms { background: #FF2D55; } .mail { background: #5AC8FA; } .insta { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fd5949 45%, #d6249f 60%, #285AEB 90%); } .web { background: #0046be; }
        .brand-footer { margin-top: 30px; font-size: 11px; color: #ddd; font-weight: 700; text-transform: uppercase; }
    </style>
</head>

            <div class="wave-container">
                <svg viewBox="0 0 500 150" preserveAspectRatio="none"><path d="M0.00,49.98 C150.00,150.00 349.20,-50.00 500.00,49.98 L500.00,150.00 L0.00,150.00 Z"></path></svg>
            </div>
        </div>

            <p class="bio">Propulsez votre présence en ligne avec des stratégies digitales innovantes et un design haute performance.</p>

            <div class="grid-active">

                <a href="mailto:Contact@Kingdream.fr" class="icon-card mail"><i class="fa-solid fa-envelope"></i></a>
                <a href="https://www.instagram.com/kingdream_digital/" target="_blank" class="icon-card insta"><i class="fa-brands fa-instagram"></i></a>
                <a href="https://Kingdream.fr" target="_blank" class="icon-card web"><i class="fa-solid fa-globe"></i></a>
            </div>
            <div class="brand-footer">KINGDREAM DIGITAL</div>
        </div>
