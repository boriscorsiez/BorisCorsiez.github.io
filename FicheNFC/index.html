<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KingDream Digital</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-page: #0a0a0a;
            --card-bg: #ffffff;
            --king-blue: #0046be;
            --text-main: #1a1a1a;
            --text-secondary: #555;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg-page);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .phone-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 400px;
            border-radius: 45px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            overflow: hidden;
            text-align: center;
            padding-bottom: 40px;
            position: relative;
        }

        /* BANNIÈRE AGRANDIE */
        .header-banner {
            height: 280px; /* Augmenté de 220 à 280 */
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .logo-img {
            width: 100%; /* Logo prend toute la largeur */
            height: auto;
            max-width: 380px;
            position: relative;
            z-index: 1; /* DERRIÈRE LA VAGUE */
            opacity: 1;
            transform: scale(1.1); /* Petit zoom pour le coté "Grand" */
            margin-top: -30px;
        }

        /* Vague de transition */
        .wave-container {
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            line-height: 0;
            z-index: 5; /* DEVANT LE LOGO */
        }

        .wave-container svg {
            width: 100%;
            height: 90px; /* Vague un peu plus haute pour le style */
            fill: var(--card-bg);
        }

        /* Zone de contenu */
        .info-content {
            padding: 30px 25px 25px 25px;
            position: relative;
            z-index: 10;
        }

        .job-title {
            font-size: 18px;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .bio {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 35px;
        }

        /* BOUTON CONTACT */
        .btn-main {
            background: #000;
            color: #fff;
            padding: 18px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 35px;
            cursor: pointer;
            border: none;
            font-size: 16px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* Grille des icônes actives */
        .grid-active {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }
        .icon-card {
            width: 82px;
            height: 82px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 24px;
            font-size: 26px;
            color: white;
            text-decoration: none;
        }

        .phone { background: #4CD964; }
        .sms { background: #FF2D55; }
        .mail { background: #5AC8FA; }
        .insta { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fd5949 45%, #d6249f 60%, #285AEB 90%); }
        .web { background: var(--king-blue); }

        /* Section "En cours" */
        .pending-section {
            border-top: 1px solid #f2f2f2;
            padding-top: 25px;
        }
        .pending-title {
            font-size: 10px;
            font-weight: 800;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }
        .grid-pending {
            display: flex;
            justify-content: center;
            gap: 12px;
            opacity: 0.15;
            filter: grayscale(1);
        }
        .icon-pending {
            width: 45px; height: 45px;
            display: flex; justify-content: center; align-items: center;
            border-radius: 14px; background: #eee; color: #666; font-size: 18px;
        }

        .brand-footer {
            margin-top: 30px;
            font-size: 11px;
            color: #ddd;
            font-weight: 700;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="phone-card">
        <div class="header-banner">
            <!-- LOGO EN GRAND -->
            <img src="https://i.ibb.co/237GdNW6/a298a2bb-7e2d-4af5-9688-5e07d30d8991.png" alt="" class="logo-img">
            
            <div class="wave-container">
                <svg viewBox="0 0 500 150" preserveAspectRatio="none">
                    <path d="M0.00,49.98 C150.00,150.00 349.20,-50.00 500.00,49.98 L500.00,150.00 L0.00,150.00 Z"></path>
                </svg>
            </div>
        </div>

        <div class="info-content">
            <p class="job-title">Digital Solutions</p>
            <p class="bio">Propulsez votre présence en ligne avec des stratégies digitales innovantes et un design haute performance.</p>

            <a id="vcardLink" class="btn-main">Ajouter au contact</a>

            <div class="grid-active">
                <a href="tel:0627205597" class="icon-card phone"><i class="fa-solid fa-phone"></i></a>
                <a href="sms:0627205597" class="icon-card sms"><i class="fa-solid fa-comment-dots"></i></a>
                <a href="mailto:Contact@Kingdream.fr" class="icon-card mail"><i class="fa-solid fa-envelope"></i></a>
                <a href="https://www.instagram.com/kingdream_digital/" target="_blank" class="icon-card insta"><i class="fa-brands fa-instagram"></i></a>
                <a href="https://Kingdream.fr" target="_blank" class="icon-card web"><i class="fa-solid fa-globe"></i></a>
            </div>

            <div class="pending-section">
                <p class="pending-title">En cours de production</p>
                <div class="grid-pending">
                    <div class="icon-pending"><i class="fa-brands fa-whatsapp"></i></div>
                    <div class="icon-pending"><i class="fa-brands fa-linkedin-in"></i></div>
                    <div class="icon-pending"><i class="fa-brands fa-tiktok"></i></div>
                    <div class="icon-pending"><i class="fa-brands fa-facebook-f"></i></div>
                </div>
            </div>
            <div class="brand-footer">KINGDREAM DIGITAL</div>
        </div>
    </div>

    <script>
        // Lien vCard direct
        const name = "KingDream Digital";
        const phone = "0627205597";
        const email = "Contact@Kingdream.fr";
        const url = "https://Kingdream.fr";

        const vcardData = [
            "BEGIN:VCARD",
            "VERSION:3.0",
            "FN:" + name,
            "ORG:" + name,
            "TEL;TYPE=CELL:" + phone,
            "EMAIL;TYPE=INTERNET:" + email,
            "URL:" + url,
            "END:VCARD"
        ].join("\n");

        const blob = new Blob([vcardData], { type: "text/vcard;charset=utf-8" });
        const vcardUrl = window.URL.createObjectURL(blob);
        const link = document.getElementById("vcardLink");
        link.href = vcardUrl;
        link.download = "KingDream.vcf";
    </script>

</body>
</html>
